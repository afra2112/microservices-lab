services:

  configserver:
    container_name: configserver
    image: afra2112/configserver-service:1.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    ports:
      - "8888:8888"
    networks:
      - microservices-net

  discovery:
    container_name: discovery
    image: afra2112/discovery-service:1.0
    ports:
      - "8761:8761"
    depends_on:
      configserver:
        condition: service_healthy
    networks:
      - microservices-net

  gateway:
    container_name: gateway
    image: afra2112/gateway-service:1.0
    ports:
      - "8222:8222"
    depends_on:
      - configserver
      - discovery
    networks:
      - microservices-net

  customer:
    container_name: customer
    image: afra2112/customer-service:1.0
    ports:
      - "8100:8100"
    depends_on:
      - configserver
      - discovery
    networks:
      - microservices-net

  product:
    container_name: product
    image: afra2112/product-service:1.0
    ports:
      - "8200:8200"
    depends_on:
      - configserver
      - discovery
    networks:
      - microservices-net

  order:
    container_name: order
    image: afra2112/order-service:1.0
    ports:
      - "8300:8300"
    depends_on:
      - configserver
      - discovery
      - customer
      - product
    networks:
      - microservices-net

  payment:
    container_name: payment
    image: afra2112/payment-service:1.0
    ports:
      - "8400:8400"
    depends_on:
      - configserver
      - discovery
      - order
    networks:
      - microservices-net

  notification:
    container_name: notification
    image: afra2112/notification-service:1.0
    ports:
      - "8500:8500"
    depends_on:
      - configserver
      - discovery
      - payment
      - order
    networks:
      - microservices-net

  postgres:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5607
      POSTGRES_DB: orders
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      - microservices-net
    restart: unless-stopped

  mysql:
    container_name: mysql
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - microservices-net
    restart: unless-stopped

  mongodb:
    container_name: mongodb
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    networks:
      - microservices-net

  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - microservices-net

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  mail-dev:
    container_name: mail-dev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservices-net

  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres:
  mongo: